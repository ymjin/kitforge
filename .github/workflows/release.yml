# Auto-release via Changesets.
#
# Flow:
#   1. You merge PRs to main that include a `.changeset/*.md`.
#   2. This action opens/updates a "Version Packages" PR (runs `changeset version`
#      → bumps versions + writes CHANGELOGs).
#   3. When you merge THAT PR, this action publishes the changed packages to npm
#      and creates git tags — no manual build/version/publish/OTP.
#
# Requires a repo secret `NPM_TOKEN` (an npm granular/automation token with
# "Bypass 2FA" + read-write on packages). Prefer a long-lived CI-only token.
name: release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the version PR commits + git tags
      pull-requests: write # open/update the "Version Packages" PR
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - uses: changesets/action@v1
        with:
          version: pnpm run version-packages # changeset version (bump + CHANGELOG)
          publish: pnpm run release # pnpm build && changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
